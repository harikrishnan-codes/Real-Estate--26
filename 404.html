<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

/* ================= ROOT COLORS ================= */

:root{
    --white:rgb(255, 255, 255);
    --black:rgb(34, 34, 34);
    --dark:rgb(0, 66, 116);
    --light:rgb(82, 196, 249);
    --accent1:rgb(0, 150, 136);
    --accent2:rgb(212, 175, 55);

    --h1:40px;
    --h3:26px;
    --p:16px;
}

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: var(--dark);
    color: var(--white);
    overflow:hidden;
}

/* ================= MAIN CONTAINER ================= */

.error-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
    z-index:2;
}

.error-container h1{
    font-size:120px;
    color:var(--accent2);
    letter-spacing:5px;
}

.error-container h3{
    font-size:var(--h3);
    margin-top:10px;
}

.error-container p{
    font-size:var(--p);
    margin-top:10px;
    color:var(--light);
}

.home-btn{
    margin-top:25px;
    padding:12px 28px;
    background:var(--accent1);
    color:var(--white);
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.home-btn:hover{
    background:var(--accent2);
}

/* ================= BACKGROUND SKYLINE ================= */

.skyline{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background:linear-gradient(to top,var(--black),transparent);
    z-index:1;
}

/* ================= FLOATING HOUSES ================= */

.house{
    position:absolute;
    bottom:-50px;
    width:40px;
    height:40px;
    background:var(--light);
    clip-path:polygon(50% 0%, 100% 40%, 100% 100%, 0% 100%, 0% 40%);
    opacity:0.6;
    animation:floatUp 10s linear infinite;
}

.house:nth-child(1){ left:10%; animation-duration:12s; }
.house:nth-child(2){ left:30%; animation-duration:9s; }
.house:nth-child(3){ left:55%; animation-duration:11s; }
.house:nth-child(4){ left:75%; animation-duration:8s; }
.house:nth-child(5){ left:90%; animation-duration:13s; }

/* ================= KEYFRAME ================= */

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:0.6;
    }
    50%{
        opacity:1;
    }
    100%{
        transform:translateY(-110vh) scale(1.3);
        opacity:0;
    }
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .error-container h1{
        font-size:80px;
    }

    .error-container h3{
        font-size:20px;
    }

}

</style>
</head>
<body>

<!-- Floating Houses -->
<div class="house"></div>
<div class="house"></div>
<div class="house"></div>
<div class="house"></div>
<div class="house"></div>

<div class="error-container">
    <h1>404</h1>
    <h3>Property Not Found</h3>
    <p>The page you are looking for doesn’t exist.</p>
    <a href="index.html" class="home-btn">Back to Home</a>
</div>

<div class="skyline"></div>

</body>
</html>
