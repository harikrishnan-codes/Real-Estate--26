<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

/* ================= ROOT COLORS ================= */

:root{
    --dark: rgb(162, 129, 115);
    --white: rgb(250, 248, 247);
    --black: rgb(29, 29, 29);
}

/* ================= GLOBAL ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Poppins', sans-serif;
    background: var(--black);
    color: var(--white);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* ================= BACKGROUND ANIMATION ================= */

.background{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    overflow:hidden;
    z-index:0;
}

.circle{
    position:absolute;
    border-radius:50%;
    background: var(--dark);
    opacity:0.15;
    animation: float 10s infinite linear;
}

.circle:nth-child(1){
    width:300px;
    height:300px;
    top:10%;
    left:10%;
    animation-duration:12s;
}

.circle:nth-child(2){
    width:200px;
    height:200px;
    bottom:15%;
    right:15%;
    animation-duration:15s;
}

.circle:nth-child(3){
    width:150px;
    height:150px;
    top:60%;
    left:40%;
    animation-duration:18s;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
    }
    50%{
        transform:translateY(-40px) rotate(180deg);
    }
    100%{
        transform:translateY(0px) rotate(360deg);
    }
}

/* ================= CONTENT ================= */

.error-container{
    text-align:center;
    z-index:2;
    max-width:600px;
}

.error-container h1{
    font-size:120px;
    font-weight:700;
    color: var(--dark);
    margin-bottom:10px;
}

.error-container h2{
    font-size:32px;
    font-weight:600;
    margin-bottom:20px;
}

.error-container p{
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
    color: var(--white);
}

.error-container a{
    display:inline-block;
    padding:12px 30px;
    background: var(--dark);
    color: var(--white);
    text-decoration:none;
    font-size:16px;
    border-radius:5px;
    transition:0.3s;
}

.error-container a:hover{
    background: var(--white);
    color: var(--black);
}

/* ================= 768px MEDIA QUERY ================= */

@media(max-width:768px){

    .error-container h1{
        font-size:80px;
    }

    .error-container h2{
        font-size:24px;
    }

    .error-container p{
        font-size:16px;
    }

    .circle:nth-child(1){
        width:200px;
        height:200px;
    }

    .circle:nth-child(2){
        width:150px;
        height:150px;
    }

    .circle:nth-child(3){
        width:120px;
        height:120px;
    }
}

</style>
</head>

<body>

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="error-container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>
        Oops! The page you're looking for doesn't exist or has been moved.
        Please return to the homepage.
    </p>
    <a href="./home2.html">Back to Home</a>
</div>

</body>
</html>
